name: climb-league-dev

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-leags}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      target: development
    environment:
      NODE_ENV: development
      PORT: 3078
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-admin}@postgres:5432/${POSTGRES_DB:-leags}?schema=public
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3079}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-me-4d87366a}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me-b961725c}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      JWT_REFRESH_IDEMPOTENCY_WINDOW_MS: ${JWT_REFRESH_IDEMPOTENCY_WINDOW_MS:-30000}
      RATE_LIMIT_TTL_MS: ${RATE_LIMIT_TTL_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      RATE_LIMIT_BLOCK_MS: ${RATE_LIMIT_BLOCK_MS:-60000}
    command: sh -c "pnpm prisma:generate && pnpm prisma:migrate:deploy && pnpm prisma:seed && pnpm start:dev"
    ports:
      - "${BACKEND_PORT:-3078}:3078"
    volumes:
      - ./backend:/app
      - backend_dev_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: development
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3078/api}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3079}
      PORT: 3079
    ports:
      - "${FRONTEND_PORT:-3079}:3079"
    volumes:
      - ./frontend:/app
      - frontend_dev_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    depends_on:
      - backend

volumes:
  postgres_dev_data:
  redis_dev_data:
  backend_dev_modules:
  frontend_dev_modules:
  frontend_next_cache:
